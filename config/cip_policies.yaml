# Carrier Intelligence Policy (CIP) library v2.0 — CIL-502.
# Declarative, config-driven; NO policy logic in Python. Each policy RECOMMENDS a
# decide-not-execute action when its conditions hold; the decision FSM (EPIC-06)
# chooses and Ericsson executes. Higher `priority` wins when several match.
#
# Conditions: { field, op, value }.  op in
#   eq | ne | lt | le | gt | ge | in | not_in
# `all` = every condition must hold; `any` = at least one. Context fields:
#   ccs, ccs_tier, cqs, sla_breaching, sustained_s, clinical_all_healthy,
#   current_action, prev_action, path_id, carrier.
# CCS tiers are the CCS-001 matrix (Protected/Stable/Degraded/Breach Risk/OUTAGE).

version: "2.0"
default_action: stay

policies:
  - id: CIP-ESCALATE
    description: SLA breach persists after a failover was already requested — escalate to ops.
    priority: 100
    all:
      - { field: sla_breaching,  op: eq, value: true }
      - { field: current_action, op: eq, value: failover }
    action: escalate
    reason: "SLA breach persists after failover"

  - id: CIP-FAILOVER
    description: Clinical continuity in OUTAGE / SLA breach — request failover.
    priority: 90
    any:
      - { field: sla_breaching, op: eq, value: true }
      - { field: ccs_tier,      op: eq, value: OUTAGE }
    action: failover
    reason: "CCS OUTAGE / SLA breach"

  - id: CIP-SHIFT
    description: At risk (Breach Risk tier) — shift to a better carrier before failover.
    priority: 70
    all:
      - { field: ccs_tier, op: eq, value: "Breach Risk" }
    action: shift
    reason: "CCS at Breach Risk"

  - id: CIP-OPTIMIZE
    description: Degraded — optimize the current path.
    priority: 50
    all:
      - { field: ccs_tier, op: eq, value: Degraded }
    action: optimize
    reason: "CCS Degraded"

  - id: CIP-STAY
    description: Healthy (Protected/Stable) — stay on the current path.
    priority: 10
    all:
      - { field: ccs_tier, op: in, value: [Protected, Stable] }
    action: stay
    reason: "CCS healthy"
