name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Test (pytest)
        run: uv run pytest

  # Build the container image. On pull requests it only builds (to prove the
  # Dockerfile works); on pushes to main and on release tags it also pushes the
  # image to GHCR (GitHub Container Registry) — this is the CD step.
  image:
    name: Build & publish image
    runs-on: ubuntu-latest
    needs: lint-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we actually publish (not on PRs).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image name + tags automatically:
      #   ghcr.io/<owner>/vitalynk-cil:main        (branch builds)
      #   ghcr.io/<owner>/vitalynk-cil:sha-abc1234 (exact commit, traceable)
      #   ghcr.io/<owner>/vitalynk-cil:1.2.3       (on a vX.Y.Z release tag)
      #   ghcr.io/<owner>/vitalynk-cil:latest      (newest on the default branch)
      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
